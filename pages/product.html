<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Product Details — ShopMate</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --primary: #2874f0;
            --primary-dark: #1f63d6;
            --accent: #ffb300;
            --accent-dark: #e6a200;
            --success: #10b981;
            --danger: #ef4444;
            --muted: #94a3b8;
            --card: #ffffff;
            --max-width: 1200px;
            --shadow-sm: 0 2px 8px rgba(11, 22, 60, 0.04);
            --shadow-md: 0 8px 30px rgba(11, 22, 60, 0.08);
            --shadow-lg: 0 18px 50px rgba(11, 22, 60, 0.12);
        }

        body {
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto;
            background: #f5f7fb;
            color: #111
        }

        a {
            color: inherit;
            text-decoration: none
        }

        header.site-header {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            position: sticky;
            top: 0;
            z-index: 1200;
            padding: 12px 0;
            box-shadow: 0 4px 20px rgba(16, 24, 40, 0.1)
        }

        .site-header .wrap {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 20px
        }

        .brand {
            color: #fff;
            font-weight: 800;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            transition: transform 0.3s
        }

        .brand:hover {
            transform: scale(1.05)
        }

        .brand .logo-mark {
            background: #fff;
            color: var(--primary);
            padding: 7px 10px;
            border-radius: 10px;
            margin-right: 10px;
            font-weight: 800
        }

        nav.primary {
            display: flex;
            gap: 8px;
            align-items: center
        }

        nav.primary a {
            color: rgba(255, 255, 255, 0.9);
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s
        }

        nav.primary a:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto
        }

        .icon-btn {
            background: transparent;
            border: 0;
            color: #fff;
            position: relative;
            font-size: 1.3rem;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px)
        }

        .badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--danger);
            color: #fff;
            font-size: 10px;
            padding: 3px 7px;
            border-radius: 999px;
            font-weight: 700
        }

        .hamburger {
            display: none;
            background: transparent;
            border: 0;
            color: #fff;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px
        }

        .breadcrumb-section {
            background: #fff;
            padding: 16px 0;
            box-shadow: var(--shadow-sm)
        }

        .breadcrumb-wrap {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 20px
        }

        .breadcrumb {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 0.9rem
        }

        .breadcrumb a {
            color: var(--primary);
            transition: color 0.3s
        }

        .breadcrumb a:hover {
            color: var(--primary-dark);
            text-decoration: underline
        }

        .product-section {
            max-width: var(--max-width);
            margin: 30px auto;
            padding: 0 20px
        }

        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            margin-bottom: 40px
        }

        .product-images {
            display: flex;
            flex-direction: column;
            gap: 16px
        }

        .main-image {
            width: 100%;
            height: 500px;
            object-fit: contain;
            border-radius: 12px;
            background: #f8f9fa;
            padding: 20px;
            border: 2px solid #e9ecef;
            transition: transform 0.3s
        }

        .main-image:hover {
            transform: scale(1.02)
        }

        .thumbnail-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 0
        }

        .thumbnail-container::-webkit-scrollbar {
            height: 6px
        }

        .thumbnail-container::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            flex-shrink: 0
        }

        .thumbnail:hover {
            border-color: var(--primary);
            transform: scale(1.05)
        }

        .thumbnail.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(40, 116, 240, 0.2)
        }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 20px
        }

        .product-title {
            font-size: 2rem;
            font-weight: 800;
            color: #111;
            line-height: 1.3
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .stars {
            color: #fbbf24;
            font-size: 1.1rem
        }

        .rating-text {
            color: var(--muted);
            font-size: 0.95rem
        }

        .product-price {
            display: flex;
            align-items: baseline;
            gap: 16px;
            padding: 16px 0;
            border-top: 1px solid #e9ecef;
            border-bottom: 1px solid #e9ecef;
            flex-wrap: wrap
        }

        .current-price {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            animation: priceGlow 2s infinite
        }

        @keyframes priceGlow {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.8
            }
        }

        .original-price {
            font-size: 1.5rem;
            color: var(--muted);
            text-decoration: line-through
        }

        .discount-badge {
            background: var(--success);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.9rem;
            animation: bounce 2s infinite
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0)
            }

            40% {
                transform: translateY(-5px)
            }

            60% {
                transform: translateY(-3px)
            }
        }

        .product-description {
            color: #4b5563;
            line-height: 1.8;
            font-size: 1rem
        }

        .product-meta {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem
        }

        .meta-label {
            color: var(--muted);
            font-weight: 600
        }

        .meta-value {
            color: #111;
            font-weight: 700;
            text-transform: capitalize
        }

        .quantity-section {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap
        }

        .quantity-label {
            font-weight: 700;
            color: #111
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8f9fa;
            padding: 4px;
            border-radius: 10px
        }

        .qty-btn {
            width: 36px;
            height: 36px;
            border: 0;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 700;
            transition: all 0.3s;
            color: var(--primary)
        }

        .qty-btn:hover:not(:disabled) {
            background: var(--primary);
            color: #fff;
            transform: scale(1.1)
        }

        .qty-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed
        }

        .qty-value {
            width: 50px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap
        }

        .btn-primary {
            flex: 1;
            min-width: 150px;
            background: var(--accent);
            color: #111;
            border: 0;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 24px rgba(255, 179, 0, 0.3)
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(255, 179, 0, 0.4)
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none
        }

        .btn-secondary {
            flex: 1;
            min-width: 150px;
            background: var(--primary);
            color: #fff;
            border: 0;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 24px rgba(40, 116, 240, 0.3)
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(40, 116, 240, 0.4)
        }

        .btn-secondary:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none
        }

        .btn-wishlist {
            background: #fff;
            border: 2px solid #e9ecef;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
            min-width: 56px
        }

        .btn-wishlist:hover {
            border-color: #ef4444;
            color: #ef4444;
            transform: scale(1.1)
        }

        .related-section {
            margin-top: 50px
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 24px;
            color: #111;
            position: relative;
            display: inline-block
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 60px;
            height: 4px;
            background: var(--accent);
            border-radius: 2px
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
            margin-top: 30px
        }

        .related-card {
            background: #fff;
            border-radius: 14px;
            padding: 14px;
            box-shadow: var(--shadow-sm);
            transition: all 0.4s;
            cursor: pointer;
            border: 1px solid transparent
        }

        .related-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(40, 116, 240, 0.1)
        }

        .related-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            background: #f0f0f0
        }

        .related-title {
            font-weight: 700;
            margin-top: 12px;
            font-size: 1rem;
            color: #111;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .related-price {
            color: var(--primary);
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 8px
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 1.1rem
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg)
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--success);
            color: #fff;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            animation: slideUp 0.3s
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .toast.show {
            display: flex
        }

        footer.site-footer {
            background: linear-gradient(180deg, #0b1220, #1a202c);
            color: #cbd5e1;
            padding: 40px 20px 30px;
            margin-top: 80px
        }

        .footer-bottom {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            max-width: var(--max-width);
            margin: 0 auto
        }

        @media(max-width: 1024px) {
            .product-container {
                gap: 30px;
                padding: 25px
            }

            .main-image {
                height: 400px
            }

            .related-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 20px
            }
        }

        @media(max-width: 880px) {
            nav.primary {
                display: none
            }

            .hamburger {
                display: block
            }

            .product-container {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 20px
            }

            .main-image {
                height: 350px
            }

            .product-title {
                font-size: 1.6rem
            }

            .current-price {
                font-size: 2rem
            }

            .original-price {
                font-size: 1.3rem
            }

            .action-buttons {
                flex-direction: column
            }

            .btn-primary,
            .btn-secondary {
                width: 100%
            }

            .related-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 16px
            }
        }

        @media(max-width: 520px) {
            .product-section {
                padding: 0 16px;
                margin: 20px auto
            }

            .product-container {
                padding: 16px
            }

            .main-image {
                height: 280px;
                padding: 10px
            }

            .product-title {
                font-size: 1.3rem
            }

            .current-price {
                font-size: 1.8rem
            }

            .original-price {
                font-size: 1.2rem
            }

            .discount-badge {
                font-size: 0.8rem;
                padding: 4px 8px
            }

            .section-title {
                font-size: 1.4rem
            }

            .product-meta {
                padding: 15px
            }

            .meta-item {
                font-size: 0.85rem
            }

            .quantity-section {
                width: 100%
            }

            .btn-primary,
            .btn-secondary {
                padding: 14px 20px;
                font-size: 1rem
            }

            .related-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px
            }

            .related-card {
                padding: 10px
            }

            .related-card img {
                height: 150px
            }

            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                font-size: 0.9rem
            }

            .thumbnail {
                width: 60px;
                height: 60px
            }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="wrap">
            <a class="brand" href="/index.html">
                <span class="logo-mark">SM</span> ShopMate
            </a>
            <nav class="primary">
                <a href="/index.html">Home</a>
                <a href="/index.html#products">Products</a>
                <a href="#">Deals</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>
            <div class="actions">
                <button class="icon-btn" id="wishlistBtn" title="Wishlist">♡</button>
                <button class="icon-btn" id="cartBtn" title="Cart">🛒 <span class="badge"
                        id="cartCount">0</span></button>
                <button class="hamburger" id="hamburger">☰</button>
            </div>
        </div>
    </header>

    <div class="breadcrumb-section">
        <div class="breadcrumb-wrap">
            <div class="breadcrumb">
                <a href="/index.html">Home</a> <span>›</span>
                <a href="/index.html#products">Products</a> <span>›</span>
                <span id="breadcrumbCategory">Loading...</span> <span>›</span>
                <span id="breadcrumbProduct">Product Details</span>
            </div>
        </div>
    </div>

    <section class="product-section">
        <div id="productContainer">
            <div class="loading">
                <div class="spinner"></div>Loading product details...
            </div>
        </div>
        <div class="related-section" id="relatedSection" style="display:none">
            <h3 class="section-title">Related Products</h3>
            <div class="related-grid" id="relatedGrid"></div>
        </div>
    </section>

    <footer class="site-footer">
        <div class="footer-bottom">© 2025 ShopMate — All rights reserved. Made with ❤️ for shoppers worldwide.</div>
    </footer>

    <div class="toast" id="toast"><span style="font-size:1.5rem">✓</span><span id="toastMessage">Item added to
            cart!</span></div>

    <script>
        let currentProduct = null;
        let quantity = 1;

        function getProductId() {
            return new URLSearchParams(window.location.search).get('id') || '1';
        }

        async function loadProductDetails() {
            const productId = getProductId();
            const container = document.getElementById('productContainer');
            try {
                const response = await fetch(`https://dummyjson.com/products/${productId}`);
                if (!response.ok) throw new Error('Product not found');
                currentProduct = await response.json();
                displayProductDetails(currentProduct);
                updateBreadcrumb(currentProduct);
                loadRelatedProducts(currentProduct.category);
            } catch (error) {
                container.innerHTML = `<div class="loading" style="color:var(--danger)">⚠️ Failed to load product details.<br><br><a href="index.html" style="color:var(--primary);text-decoration:underline">Return to Shop</a></div>`;
            }
        }

        function displayProductDetails(product) {
            const container = document.getElementById('productContainer');
            const discount = Math.round(product.discountPercentage || 15);
            const originalPrice = Math.round(product.price * 83 / (1 - discount / 100));
            const rating = product.rating || 4.5;
            const fullStars = Math.floor(rating);
            const hasHalfStar = rating % 1 >= 0.5;
            let starsHTML = '★'.repeat(fullStars);
            if (hasHalfStar) starsHTML += '⯨';
            starsHTML += '☆'.repeat(5 - Math.ceil(rating));
            const images = product.images || [product.thumbnail];

            container.innerHTML = `
                <div class="product-container">
                    <div class="product-images">
                        <img src="${images[0]}" alt="${product.title}" class="main-image" id="mainImage">
                        <div class="thumbnail-container">
                            ${images.map((img, index) => `<img src="${img}" alt="${product.title} ${index + 1}" class="thumbnail ${index === 0 ? 'active' : ''}" onclick="changeMainImage('${img}', this)">`).join('')}
                        </div>
                    </div>
                    <div class="product-info">
                        <h1 class="product-title">${product.title}</h1>
                        <div class="product-rating">
                            <span class="stars">${starsHTML}</span>
                            <span class="rating-text">${rating} (${product.reviews?.length || Math.floor(Math.random() * 500) + 100} reviews)</span>
                        </div>
                        <div class="product-price">
                            <span class="current-price">₹${Math.round(product.price * 83).toLocaleString()}</span>
                            <span class="original-price">₹${originalPrice.toLocaleString()}</span>
                            <span class="discount-badge">${discount}% OFF</span>
                        </div>
                        <p class="product-description">${product.description}</p>
                        <div class="product-meta">
                            <div class="meta-item"><span class="meta-label">Brand:</span><span class="meta-value">${product.brand || 'Generic'}</span></div>
                            <div class="meta-item"><span class="meta-label">Category:</span><span class="meta-value">${product.category}</span></div>
                            <div class="meta-item"><span class="meta-label">Stock:</span><span class="meta-value" style="color:${product.stock > 10 ? 'var(--success)' : 'var(--danger)'}">${product.stock > 0 ? `${product.stock} available` : 'Out of stock'}</span></div>
                            <div class="meta-item"><span class="meta-label">Warranty:</span><span class="meta-value">${product.warrantyInformation || '1 Year Warranty'}</span></div>
                            <div class="meta-item"><span class="meta-label">Shipping:</span><span class="meta-value">${product.shippingInformation || 'Ships in 2-3 days'}</span></div>
                        </div>
                        <div class="quantity-section">
                            <span class="quantity-label">Quantity:</span>
                            <div class="quantity-controls">
                                <button class="qty-btn" onclick="decrementQty()" ${product.stock === 0 ? 'disabled' : ''}>−</button>
                                <span class="qty-value" id="qtyValue">1</span>
                                <button class="qty-btn" onclick="incrementQty()" ${product.stock === 0 ? 'disabled' : ''}>+</button>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-primary" onclick="addToCart()" ${product.stock === 0 ? 'disabled' : ''}>${product.stock === 0 ? '❌ Out of Stock' : '🛒 Add to Cart'}</button>
                            <button class="btn-secondary" onclick="buyNow()" ${product.stock === 0 ? 'disabled' : ''}>⚡ Buy Now</button>
                            <button class="btn-wishlist" onclick="addToWishlist()">♡</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateBreadcrumb(product) {
            document.getElementById('breadcrumbCategory').textContent = product.category;
            document.getElementById('breadcrumbProduct').textContent = product.title.length > 30 ? product.title.substring(0, 30) + '...' : product.title;
            document.title = `${product.title} — ShopMate`;
        }

        function changeMainImage(imageSrc, thumbnail) {
            document.getElementById('mainImage').src = imageSrc;
            document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
            thumbnail.classList.add('active');
        }

        function incrementQty() {
            if (currentProduct && quantity < currentProduct.stock) {
                quantity++;
                document.getElementById('qtyValue').textContent = quantity;
            }
        }

        function decrementQty() {
            if (quantity > 1) {
                quantity--;
                document.getElementById('qtyValue').textContent = quantity;
            }
        }

        function addToCart() {
            if (!currentProduct) return;
            let cartData = JSON.parse(sessionStorage.getItem('cartData')) || [];
            const existingItem = cartData.find(item => item.productId === currentProduct.id);

            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cartData.push({
                    id: 'cart_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    productId: currentProduct.id,
                    quantity: quantity
                });
            }

            sessionStorage.setItem('cartData', JSON.stringify(cartData));
            updateCartBadge();
            showToast(`${quantity} × ${currentProduct.title} added to cart!`);
            quantity = 1;
            document.getElementById('qtyValue').textContent = '1';
        }

        function buyNow() {
            addToCart();
            showToast('Redirecting to checkout... 🚀');
            setTimeout(() => { alert('Checkout feature coming soon!'); }, 1500);
        }

        function addToWishlist() {
            showToast(`${currentProduct.title} added to wishlist! ❤️`);
        }

        function updateCartBadge() {
            let cartData = JSON.parse(sessionStorage.getItem('cartData')) || [];
            const totalItems = cartData.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = totalItems;
        }

        async function loadRelatedProducts(category) {
            try {
                const response = await fetch(`https://dummyjson.com/products/category/${category}?limit=20`);
                const data = await response.json();
                const relatedProducts = data.products.filter(p => p.id !== currentProduct.id).slice(0, 4);
                if (relatedProducts.length > 0) displayRelatedProducts(relatedProducts);
            } catch (error) {
                console.error('Error loading related products:', error);
            }
        }

        function displayRelatedProducts(products) {
            const grid = document.getElementById('relatedGrid');
            const section = document.getElementById('relatedSection');
            grid.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'related-card';
                card.onclick = () => navigateToProduct(product.id);
                card.innerHTML = `<img src="${product.thumbnail}" alt="${product.title}" loading="lazy"><div class="related-title">${product.title}</div><div class="related-price">₹${Math.round(product.price * 83).toLocaleString()}</div>`;
                grid.appendChild(card);
            });
            section.style.display = 'block';
        }

        function navigateToProduct(productId) {
            window.location.href = `product.html?id=${productId}`;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById('cartBtn').addEventListener('click', () => { window.location.href = 'cart.html'; });
        document.getElementById('wishlistBtn').addEventListener('click', () => { showToast('Wishlist feature coming soon! ❤️'); });
        document.getElementById('hamburger').addEventListener('click', () => { showToast('Use navigation buttons'); });

        document.addEventListener('DOMContentLoaded', () => {
            loadProductDetails();
            updateCartBadge();
        });
    </script>
</body>

</html>
